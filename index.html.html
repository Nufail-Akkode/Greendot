<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f0f0f;color:#e0e0e0;min-height:100vh}
  .wrap{max-width:560px;margin:0 auto;padding:28px 20px}
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
  .header h1{font-size:18px;font-weight:500;color:#fff;letter-spacing:-.3px}
  .header span{font-size:13px;color:#555}
  .stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
  .stat{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:10px;padding:16px}
  .stat .lbl{font-size:11px;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
  .stat .val{font-size:22px;font-weight:500;color:#fff}
  .stat .sub{font-size:12px;color:#444;margin-top:4px}
  .card{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:10px;padding:16px;margin-bottom:16px}
  .card-title{font-size:12px;color:#555;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px}
  .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px}
  .form-row input,.form-row select{background:#111;border:0.5px solid #2a2a2a;border-radius:8px;padding:9px 12px;font-size:13px;color:#e0e0e0;width:100%;outline:none;font-family:inherit}
  .form-row input::placeholder{color:#444}
  .form-row input:focus,.form-row select:focus{border-color:#444}
  .form-row select option{background:#1a1a1a;color:#e0e0e0}
  .add-btn{background:#fff;color:#111;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:500;cursor:pointer;width:100%;font-family:inherit}
  .add-btn:hover{background:#e0e0e0}
  .tab-row{display:flex;gap:8px}
  .tab{background:none;border:0.5px solid #2a2a2a;border-radius:20px;padding:5px 14px;font-size:12px;color:#555;cursor:pointer;font-family:inherit}
  .tab.active{background:#222;color:#ccc;border-color:#444}
  .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
  .bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .bar-label{font-size:11px;color:#555;width:36px;text-align:right;flex-shrink:0}
  .bar-track{flex:1;background:#111;border-radius:4px;height:6px;overflow:hidden}
  .bar-fill{height:6px;border-radius:4px;transition:width .3s}
  .bar-val{font-size:12px;color:#555;width:70px;text-align:right;flex-shrink:0}
  .cats-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
  .cat-tag{display:flex;align-items:center;gap:6px;background:#111;border:0.5px solid #2a2a2a;border-radius:20px;padding:5px 12px;font-size:12px;color:#aaa}
  .cat-remove{background:none;border:none;color:#555;cursor:pointer;font-size:15px;line-height:1;padding:0 0 0 2px}
  .cat-remove:hover{color:#aaa}
  .cat-add-row{display:flex;gap:8px;margin-top:10px}
  .cat-add-row input{background:#111;border:0.5px solid #2a2a2a;border-radius:8px;padding:7px 12px;font-size:12px;color:#e0e0e0;flex:1;outline:none;font-family:inherit}
  .cat-add-row input::placeholder{color:#444}
  .cat-add-row button{background:#2a2a2a;color:#ccc;border:none;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;font-family:inherit}
  .cat-add-row button:hover{background:#333}
  .section-label{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
  .expense-list{display:flex;flex-direction:column;gap:8px;margin-bottom:32px}
  .expense-item{background:#1a1a1a;border:0.5px solid #2a2a2a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
  .exp-left{display:flex;align-items:center;gap:12px}
  .cat-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .exp-info .name{font-size:14px;color:#ccc}
  .exp-info .meta{font-size:11px;color:#444;margin-top:2px}
  .exp-right{display:flex;align-items:center;gap:12px}
  .exp-amt{font-size:15px;font-weight:500;color:#fff}
  .del-btn{background:none;border:none;color:#333;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
  .del-btn:hover{color:#888;background:#222}
  .empty{text-align:center;color:#3a3a3a;font-size:13px;padding:28px 0}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<script>
const COLORS = ['#5c7cfa','#20c997','#ff6b6b','#ffd43b','#74c0fc','#f783ac','#a9e34b','#e599f7','#63e6be'];
const STORAGE_KEY_EXP = 'xp_expenses';
const STORAGE_KEY_CAT = 'xp_categories';

let expenses = JSON.parse(localStorage.getItem(STORAGE_KEY_EXP) || '[]');
let categories = JSON.parse(localStorage.getItem(STORAGE_KEY_CAT) || '["Food","Transport","Shopping","Bills","Health","Other"]');
let view = 'date';

function getColor(cat){
  const i = categories.indexOf(cat);
  return COLORS[i % COLORS.length] || '#888';
}

function save(){
  localStorage.setItem(STORAGE_KEY_EXP, JSON.stringify(expenses));
  localStorage.setItem(STORAGE_KEY_CAT, JSON.stringify(categories));
}

function addExpense(){
  const amt = parseFloat(document.getElementById('inp-amt').value);
  const cat = document.getElementById('inp-cat').value;
  const date = document.getElementById('inp-date').value;
  if(!amt || !cat || !date) return;
  expenses.push({id: Date.now(), amt, cat, date});
  document.getElementById('inp-amt').value = '';
  save(); render();
}

function deleteExpense(id){
  expenses = expenses.filter(e => e.id !== id);
  save(); render();
}

function addCategory(){
  const v = document.getElementById('new-cat').value.trim();
  if(!v || categories.includes(v)) return;
  categories.push(v);
  document.getElementById('new-cat').value = '';
  save(); render();
}

function removeCategory(cat){
  categories = categories.filter(c => c !== cat);
  save(); render();
}

function groupBy(key){
  const map = {};
  expenses.forEach(e => {
    const k = key === 'month' ? e.date.slice(0,7) : e.date;
    map[k] = (map[k] || 0) + e.amt;
  });
  return map;
}

function fmtDate(d){
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(d.length === 7){
    const [y,m] = d.split('-');
    return months[+m-1] + ' ' + y;
  }
  const [,m,dd] = d.split('-');
  return months[+m-1] + ' ' + +dd;
}

function fmtINR(n){
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function render(){
  const today = new Date().toISOString().slice(0,10);
  const thisMonth = today.slice(0,7);
  const todayTotal = expenses.filter(e => e.date === today).reduce((s,e) => s+e.amt, 0);
  const monthTotal = expenses.filter(e => e.date.startsWith(thisMonth)).reduce((s,e) => s+e.amt, 0);
  const monthCount = expenses.filter(e => e.date.startsWith(thisMonth)).length;
  const todayCount = expenses.filter(e => e.date === today).length;

  const grouped = groupBy(view);
  const sortedKeys = Object.keys(grouped).sort().slice(-8);
  const maxVal = Math.max(...sortedKeys.map(k => grouped[k]), 1);

  const sortedExp = [...expenses].sort((a,b) => b.date.localeCompare(a.date)).slice(0,40);

  document.getElementById('app').innerHTML = `
    <div class="header">
      <h1>Expenses</h1>
      <span>${new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</span>
    </div>

    <div class="stats">
      <div class="stat">
        <div class="lbl">Today</div>
        <div class="val">${fmtINR(todayTotal)}</div>
        <div class="sub">${todayCount} entr${todayCount===1?'y':'ies'}</div>
      </div>
      <div class="stat">
        <div class="lbl">This month</div>
        <div class="val">${fmtINR(monthTotal)}</div>
        <div class="sub">${monthCount} entr${monthCount===1?'y':'ies'}</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Add expense</div>
      <div class="form-row">
        <input id="inp-amt" type="number" placeholder="Amount (₹)" min="0" step="1">
        <select id="inp-cat">
          ${categories.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
        <input id="inp-date" type="date" value="${today}">
      </div>
      <button class="add-btn" onclick="addExpense()">Add</button>
    </div>

    <div class="card">
      <div class="chart-header">
        <div class="card-title" style="margin:0">Spending trend</div>
        <div class="tab-row">
          <button class="tab ${view==='date'?'active':''}" onclick="view='date';render()">Daily</button>
          <button class="tab ${view==='month'?'active':''}" onclick="view='month';render()">Monthly</button>
        </div>
      </div>
      ${sortedKeys.length === 0
        ? `<div class="empty">No data yet</div>`
        : sortedKeys.map(k => `
          <div class="bar-row">
            <div class="bar-label">${fmtDate(k)}</div>
            <div class="bar-track"><div class="bar-fill" style="width:${Math.round(grouped[k]/maxVal*100)}%;background:${view==='month'?'#5c7cfa':'#444'}"></div></div>
            <div class="bar-val">${fmtINR(grouped[k])}</div>
          </div>`).join('')}
    </div>

    <div class="card">
      <div class="card-title">Categories</div>
      <div class="cats-row">
        ${categories.map((c,i) => `
          <div class="cat-tag">
            <span style="width:8px;height:8px;border-radius:50%;background:${COLORS[i%COLORS.length]};display:inline-block;flex-shrink:0"></span>
            ${c}
            <button class="cat-remove" onclick="removeCategory('${c}')">×</button>
          </div>`).join('')}
      </div>
      <div class="cat-add-row">
        <input id="new-cat" placeholder="New category..." onkeydown="if(event.key==='Enter')addCategory()">
        <button onclick="addCategory()">Add</button>
      </div>
    </div>

    <div class="section-label">Recent entries</div>
    <div class="expense-list">
      ${sortedExp.length === 0
        ? `<div class="empty">No expenses yet — add your first one above</div>`
        : sortedExp.map(e => `
          <div class="expense-item">
            <div class="exp-left">
              <div class="cat-dot" style="background:${getColor(e.cat)}"></div>
              <div class="exp-info">
                <div class="name">${e.cat}</div>
                <div class="meta">${new Date(e.date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}</div>
              </div>
            </div>
            <div class="exp-right">
              <div class="exp-amt">${fmtINR(e.amt)}</div>
              <button class="del-btn" onclick="deleteExpense(${e.id})">×</button>
            </div>
          </div>`).join('')}
    </div>
  `;
}

render();
</script>
</body>
</html>
